name: stage4
version: 0.1.0
publish_to: 'none'
description: Stage 4 — Trainer program organization and scheduling calendar.
environment:
  sdk: ">=3.0.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.2
  google_sign_in: ^6.3.0
  cloud_firestore: ^5.6.7
  # State management
  flutter_riverpod: ^2.6.1
  # Routing
  go_router: ^15.1.2
  # Media / external links
  youtube_player_iframe: ^6.0.2
  url_launcher: ^6.3.2

dev_dependencies:
  fake_cloud_firestore: ^3.1.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
